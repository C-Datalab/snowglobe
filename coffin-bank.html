<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Last Deposit</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@500;600&family=Pirata+One&display=swap" rel="stylesheet">
<style>
  :root {
    --amber: #ffc14d;
    --parch: #d8c9a3;
    --ghost: #cfe8d8;
    --fog-intensity: 0.7;  /* master fog dial: 0 = off, 1 = cave.html thickness */
    /* stage pixel dims — set by JS (fitStage) */
    --sw: 1000px;
    --sh: 500px;

    /* ===== CALIBRATION KNOBS =====
       x values are fractions of stage width (unitless), y values are % of stage
       height. The crypt is ONE element: marble.png + shading, masked by
       crypt.svg (Waz's silhouette, viewBox 3084x1173 ≈ 2.63:1). Derived
       geometry: tower right edge at 0.1356 of shape width, slab top at 0.393
       of shape height. Framing/borders to come later. */
    --crypt-left: 0.08;   /* crypt bounding box                                 */
    --crypt-w: 0.84;      /* width fraction; height keeps the SVG's aspect      */
    --crypt-h: 0.639;     /* = --crypt-w * 2 / 2.63 (stage is 2:1)              */
    --crypt-bottom: 20%;  /* gap below the crypt (stepped plinth lives here)    */
    --crypt-top: 41.2%;   /* slab top edge (coin line) = top + 0.393 * height   */
    --tower-right: 0.194; /* reveal line = left + 0.1356 * width                */
    --arm-y: 21%;         /* arm top when reaching (bones ride above the slab)  */
    --arm-len: 0.45;      /* arm image width (fraction of stage width)          */
    --arm-reach: -4%;     /* how far the arm extends (translateX, own-width %)  */
    --coin-x: 0.59;       /* coin landing spot (left edge) — within arm's reach */
    --plaque-x: 34.9%;    /* engraved plaque box on the marble face             */
    --plaque-y: 50.5%;
    --plaque-w: 42.3%;
    --plaque-h: 17%;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    /* mausoleum interior backdrop under a darkening veil — if mausoleum.jpg
       is missing, the veil over the base colour ≈ the old plain gradient */
    background:
      radial-gradient(ellipse at 50% 18%, rgba(16, 21, 29, 0.35), rgba(4, 6, 10, 0.72) 78%),
      url('mausoleum.jpg') center / cover no-repeat fixed,
      #04060a;
    color: #aab2c0;
    font-family: 'Oswald', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(0.5rem, 1.4vh, 1.2rem);
    padding: clamp(0.8rem, 2vh, 2rem) clamp(0.8rem, 2vh, 2rem) 0.5vh;
    overflow: hidden;
  }
  /* the scene sinks to the bottom of the viewport — plinth on the floor */
  .main { margin-top: auto; margin-bottom: 0; }
  h1 {
    font-weight: 600;
    font-size: clamp(1.2rem, 4vmin, 2.2rem);
    letter-spacing: 0.35em;
    color: var(--amber);
    text-shadow: 0 0 18px rgba(255, 190, 80, 0.35);
    text-transform: uppercase;
    text-align: center;
  }
  h1 .sub { color: #7d8494; font-size: 0.55em; letter-spacing: 0.5em; display: block; margin-top: 2px; }

  /* page content sits below the fog (fogwrapper z-index 50, click-through) */
  h1, .main, .hint, .version { position: relative; z-index: 2; }

  .main { display: flex; align-items: center; gap: calc(var(--sw) * 0.03); }

  /* ================= stage ================= */
  .stage {
    position: relative;
    width: min(66vw, 120vh, 1100px);
    aspect-ratio: 2 / 1;
    overflow: hidden;    /* still needed: clips the coin drop-in and arm window */
    /* no background/shadow — the crypt stands directly in the mausoleum */
  }
  /* the crypt: ONE element — marble texture + shading gradient, cut to Waz's
     silhouette with crypt.svg as a mask. Single element = texture and shading
     are continuous by construction (no seams possible). The drop-shadow filter
     follows the masked silhouette. Gradient doubles as fallback if marble.png
     is missing. */
  .crypt {
    position: absolute;
    left: calc(var(--sw) * var(--crypt-left));
    width: calc(var(--sw) * var(--crypt-w));
    height: calc(var(--sh) * var(--crypt-h));
    bottom: var(--crypt-bottom);
    background-color: #9ba0ab;
    background-image:
      linear-gradient(180deg, #d6d9df, #9ba0ab 55%, #6e737e),
      url('marble.png');
    background-blend-mode: multiply;
    background-size: 100% 100%, calc(var(--sw) * 0.34);
    /* Waz's crypt.svg silhouette inlined as a data URI — no external fetch,
       so the mask can never fail-to-load (which hides the whole element) */
    -webkit-mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 3084 1173' xmlns='http://www.w3.org/2000/svg'%3E%3Cg transform='translate(-513 -394)'%3E%3Cpath d='M517 398 862.307 398C900.45 398 931.37 428.912 931.37 467.044L931.37 854.893 3552.63 854.893C3575.48 854.893 3594 873.409 3594 896.249L3594 1522.64C3594 1545.48 3575.48 1564 3552.63 1564L558.366 1564C535.52 1564 517 1545.48 517 1522.64L517 945.281 517 896.249Z' fill='%23000'/%3E%3C/g%3E%3C/svg%3E");
    -webkit-mask-size: 100% 100%;
    -webkit-mask-repeat: no-repeat;
    mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 3084 1173' xmlns='http://www.w3.org/2000/svg'%3E%3Cg transform='translate(-513 -394)'%3E%3Cpath d='M517 398 862.307 398C900.45 398 931.37 428.912 931.37 467.044L931.37 854.893 3552.63 854.893C3575.48 854.893 3594 873.409 3594 896.249L3594 1522.64C3594 1545.48 3575.48 1564 3552.63 1564L558.366 1564C535.52 1564 517 1545.48 517 1522.64L517 945.281 517 896.249Z' fill='%23000'/%3E%3C/g%3E%3C/svg%3E");
    mask-size: 100% 100%;
    mask-repeat: no-repeat;
    filter: drop-shadow(0 calc(var(--sh) * 0.03) calc(var(--sh) * 0.05) rgba(0,0,0,0.65));
    z-index: 1;
  }

  /* ---- stepped plinth grounding the crypt; carved buttons on its face ---- */
  .plinth {
    position: absolute;
    background-color: #8e939e;
    background-image:
      linear-gradient(180deg, #c4c8cf, #8e939e 50%, #5f646e),
      url('marble.png');
    background-blend-mode: multiply;
    background-size: 100% 100%, calc(var(--sw) * 0.34);
    border-radius: calc(var(--sw) * 0.003);
  }
  .plinth.p1 {
    left: calc(var(--sw) * 0.065); width: calc(var(--sw) * 0.87);
    bottom: 15.5%; height: 5.2%;
    box-shadow: inset 0 calc(var(--sh) * 0.008) calc(var(--sh) * 0.008) rgba(255,255,255,0.28),
                0 calc(var(--sh) * 0.01) calc(var(--sh) * 0.02) rgba(0,0,0,0.55);
  }
  .plinth.p2 {
    left: calc(var(--sw) * 0.05); width: calc(var(--sw) * 0.90);
    bottom: 0; height: 16%;
    box-shadow: inset 0 calc(var(--sh) * 0.008) calc(var(--sh) * 0.008) rgba(255,255,255,0.28),
                0 calc(var(--sh) * 0.025) calc(var(--sh) * 0.035) rgba(0,0,0,0.75);
  }
  /* buttons carved into the lower plinth step — recessed panels like the plaque */
  .carvedbtn {
    position: absolute; bottom: 3%; height: 10.5%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.07);
    border: none; cursor: pointer;
    border-radius: calc(var(--sh) * 0.008);
    box-shadow:
      inset 0 calc(var(--sh) * 0.006) calc(var(--sh) * 0.010) rgba(0,0,0,0.45),
      inset 0 calc(var(--sh) * -0.003) calc(var(--sh) * 0.005) rgba(255,255,255,0.28),
      0 calc(var(--sh) * 0.002) 0 rgba(255,255,255,0.22),
      0 calc(var(--sh) * -0.002) calc(var(--sh) * 0.004) rgba(0,0,0,0.3);
    font-family: 'Cinzel', serif; font-weight: 600;
    font-size: calc(var(--sw) * 0.017);
    letter-spacing: 0.3em; text-transform: uppercase;
    color: #1e2128;
    text-shadow: 0 calc(var(--sh) * 0.003) 0 rgba(255,255,255,0.4),
                 0 calc(var(--sh) * -0.003) calc(var(--sh) * 0.004) rgba(0,0,0,0.75);
    transition: color 0.2s, text-shadow 0.2s;
    z-index: 3;
    pointer-events: auto;
  }
  .carvedbtn:hover, .carvedbtn:focus-visible {
    color: #b58a2e;
    text-shadow: 0 0 calc(var(--sh) * 0.03) rgba(255, 193, 77, 0.8),
                 0 calc(var(--sh) * 0.003) 0 rgba(255,255,255,0.35);
    box-shadow:
      inset 0 calc(var(--sh) * 0.006) calc(var(--sh) * 0.010) rgba(0,0,0,0.45),
      inset 0 calc(var(--sh) * -0.003) calc(var(--sh) * 0.005) rgba(255,255,255,0.28),
      0 0 calc(var(--sh) * 0.025) rgba(255, 193, 77, 0.35);
    outline: none;
  }
  .carvedbtn:active { box-shadow: inset 0 calc(var(--sh) * 0.010) calc(var(--sh) * 0.014) rgba(0,0,0,0.6); }
  .carvedbtn#coinBtn      { left: 24%; width: 30%; }
  .carvedbtn#reshuffleBtn { left: 58%; width: 22%; }

  /* ---- carved decoration (children of .crypt are clipped by its mask) ----
     positions are % of the crypt box: tower right edge ≈ 13.6% of its width,
     slab top ≈ 39.3% of its height */
  .crypt > div { position: absolute; pointer-events: none; }
  .molding {                       /* horizontal carved groove */
    background: linear-gradient(180deg,
      rgba(0,0,0,0.32), rgba(255,255,255,0.20) 55%, rgba(0,0,0,0.22));
    border-radius: calc(var(--sh) * 0.004);
    height: calc(var(--sh) * 0.012);
  }
  .molding.mtop  { left: 15.5%; right: 2.5%; top: 46%; }   /* below the slab's top edge */
  .molding.mbase { left: 2.5%;  right: 2.5%; bottom: 8%; } /* plinth line near the base */
  .plaqueframe {                   /* recessed panel around the engraved name */
    left: 29.4%; top: 52%; width: 55.3%; height: 32%;
    background: rgba(0,0,0,0.07);
    border-radius: calc(var(--sh) * 0.008);
    box-shadow:
      inset 0 calc(var(--sh) * 0.006) calc(var(--sh) * 0.010) rgba(0,0,0,0.45),
      inset 0 calc(var(--sh) * -0.003) calc(var(--sh) * 0.005) rgba(255,255,255,0.28),
      0 calc(var(--sh) * 0.002) 0 rgba(255,255,255,0.22),
      0 calc(var(--sh) * -0.002) calc(var(--sh) * 0.004) rgba(0,0,0,0.3);
  }
  .rip {                           /* carved R.I.P. on the raised block */
    left: 0; top: 9%; width: 13.6%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Pirata One', 'IM Fell English', serif;
    font-size: calc(var(--sw) * 0.038);
    letter-spacing: 0.06em;
    color: #2e323a;
    text-shadow: 0 calc(var(--sh) * 0.004) 0 rgba(255,255,255,0.38),
                 0 calc(var(--sh) * -0.003) calc(var(--sh) * 0.005) rgba(0,0,0,0.8);
  }
  .stain {                         /* weathering blotches */
    border-radius: 50%;
    filter: blur(calc(var(--sh) * 0.015));
    opacity: 0.65;
  }
  .stain.s1 { left: -2%; top: 2%; width: 14%; height: 26%;
              background: radial-gradient(circle, rgba(78,88,80,0.6), transparent 68%); }
  .stain.s2 { right: -1%; bottom: -4%; width: 22%; height: 30%;
              background: radial-gradient(circle, rgba(70,76,84,0.55), transparent 70%); }
  .stain.s3 { left: 30%; bottom: -2%; width: 12%; height: 18%;
              background: radial-gradient(circle, rgba(82,90,78,0.5), transparent 70%); }
  .stain.s4 { left: 16%; top: 38%; width: 10%; height: 16%;
              background: radial-gradient(circle, rgba(74,80,72,0.45), transparent 70%); }
  .stain.s5 { right: 24%; top: 40%; width: 16%; height: 14%;
              background: radial-gradient(circle, rgba(66,72,80,0.4), transparent 72%); }
  /* overall degradation: uneven grime, darkened corners, dirt pooling along
     the base — one multiply layer covering the whole stone */
  .grime {
    left: 0; top: 0; width: 100%; height: 100%;
    background:
      radial-gradient(ellipse at 0% 100%, rgba(45,50,45,0.5), transparent 45%),
      radial-gradient(ellipse at 100% 100%, rgba(40,44,50,0.45), transparent 40%),
      radial-gradient(ellipse at 8% 0%, rgba(50,55,50,0.35), transparent 35%),
      radial-gradient(ellipse at 60% 110%, rgba(48,52,48,0.4), transparent 30%),
      linear-gradient(180deg, transparent 82%, rgba(40,44,42,0.35) 100%);
    mix-blend-mode: multiply;
    opacity: 0.8;
  }
  /* water streaks bleeding down from the top groove and plaque corners */
  .streak {
    width: 1.1%;
    background: linear-gradient(180deg, rgba(52,58,60,0.5), rgba(52,58,60,0.15) 60%, transparent);
    filter: blur(calc(var(--sh) * 0.004));
    mix-blend-mode: multiply;
  }
  .streak.k1 { left: 22%;   top: 47%; height: 34%; }
  .streak.k2 { left: 31%;   top: 47%; height: 22%; }
  .streak.k3 { left: 30%;   top: 84%; height: 12%; }   /* plaque corner */
  .streak.k4 { left: 84%;   top: 84%; height: 14%; }   /* plaque corner */
  .streak.k5 { left: 88%;   top: 47%; height: 28%; }
  .streak.k6 { left: 7%;    top: 12%; height: 30%; width: 0.9%; }  /* block face */

  /* ── Scrolling fog — same Ravyre technique as quirkiest.com cave.html ──
     Each foglayer is 200% wide (two tiles, float:left at 50% each);
     foglayer_moveme slides left 0 → -100% for a seamless loop. Separate
     opacity keyframes per layer give the breathing feel. Fixed, full-screen,
     mix-blend screen so the white fog reads as luminous wisps; page content
     sits above it (z-index 2+). --fog-intensity is the master dial. */
  .fogwrapper {
    position: fixed; inset: 0;
    z-index: 50;             /* top layer, drifting over everything… */
    pointer-events: none;    /* …but clicks pass straight through it */
    overflow: hidden;
    mix-blend-mode: screen;
  }
  .foginner {   /* iOS: filter and mix-blend-mode can't share an element */
    width: 100%; height: 100%; position: relative;
    filter: blur(1px) grayscale(0.3) saturate(0.9);
  }
  #foglayer_01, #foglayer_02, #foglayer_03 { height: 100%; position: absolute; width: 200%; }
  .foglayer .image01, .foglayer .image02 { float: left; height: 100%; width: 50%; }
  #foglayer_01 .image01, #foglayer_01 .image02 { background: url('fog1.png') center center/cover no-repeat transparent; }
  #foglayer_02 .image01, #foglayer_02 .image02,
  #foglayer_03 .image01, #foglayer_03 .image02 { background: url('fog2.png') center center/cover no-repeat transparent; }
  #foglayer_01 { animation: foglayer_01_opacity 10s linear infinite, foglayer_moveme 15s linear infinite; }
  #foglayer_02 { animation: foglayer_02_opacity 21s linear infinite, foglayer_moveme 13s linear infinite; }
  #foglayer_03 { animation: foglayer_03_opacity 21s linear infinite, foglayer_moveme 13s linear infinite; }
  @keyframes foglayer_01_opacity {
    0%   { opacity: calc(.15 * var(--fog-intensity)); }
    22%  { opacity: calc(.75 * var(--fog-intensity)); }
    40%  { opacity: calc(.45 * var(--fog-intensity)); }
    58%  { opacity: calc(.65 * var(--fog-intensity)); }
    80%  { opacity: calc(.25 * var(--fog-intensity)); }
    100% { opacity: calc(.15 * var(--fog-intensity)); }
  }
  @keyframes foglayer_02_opacity {
    0%   { opacity: calc(.65 * var(--fog-intensity)); }
    25%  { opacity: calc(.30 * var(--fog-intensity)); }
    50%  { opacity: calc(.15 * var(--fog-intensity)); }
    80%  { opacity: calc(.50 * var(--fog-intensity)); }
    100% { opacity: calc(.65 * var(--fog-intensity)); }
  }
  @keyframes foglayer_03_opacity {
    0%   { opacity: calc(.90 * var(--fog-intensity)); }
    27%  { opacity: calc(.30 * var(--fog-intensity)); }
    52%  { opacity: calc(.70 * var(--fog-intensity)); }
    68%  { opacity: calc(.40 * var(--fog-intensity)); }
    100% { opacity: calc(.90 * var(--fog-intensity)); }
  }
  @keyframes foglayer_moveme { 0% { left: 0; } 100% { left: -100%; } }
  @media (prefers-reduced-motion: reduce) {
    #foglayer_01, #foglayer_02, #foglayer_03 { animation: none; opacity: calc(.3 * var(--fog-intensity)); }
  }

  /* name carved into the marble plaque */
  .engraving {
    position: absolute;
    left: var(--plaque-x); top: var(--plaque-y);
    width: var(--plaque-w); height: var(--plaque-h);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-weight: 600;
    letter-spacing: 0.22em; white-space: nowrap;
    color: #0d1015;
    text-shadow: 0 calc(var(--sh) * 0.003) 0 rgba(255,255,255,0.4),
                 0 calc(var(--sh) * -0.003) calc(var(--sh) * 0.004) rgba(0,0,0,0.75);
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 2;
  }
  .stage.engraved .engraving { opacity: 1; animation: engraveGlow 1.4s ease; }
  @keyframes engraveGlow {
    0%   { text-shadow: 0 0 0 transparent; }
    40%  { text-shadow: 0 0 calc(var(--sh) * 0.05) rgba(255, 193, 77, 0.95), 0 0 calc(var(--sh) * 0.015) rgba(255, 220, 150, 0.9); }
    100% { text-shadow: 0 calc(var(--sh) * 0.003) 0 rgba(255,255,255,0.4), 0 calc(var(--sh) * -0.003) calc(var(--sh) * 0.004) rgba(0,0,0,0.75); }
  }

  /* ghostly ALL DONE floating above the crypt (end state) */
  .ghosttext {
    position: absolute; left: 55%; top: 4%;
    transform: translateX(-50%);
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: calc(var(--sw) * 0.075);
    letter-spacing: 0.3em; white-space: nowrap;
    color: var(--ghost);
    text-shadow: 0 0 calc(var(--sw) * 0.008) rgba(207, 232, 216, 0.9),
                 0 0 calc(var(--sw) * 0.025) rgba(160, 220, 190, 0.55),
                 0 0 calc(var(--sw) * 0.06) rgba(120, 200, 170, 0.35);
    opacity: 0; pointer-events: none;
    filter: blur(0.4px);
    z-index: 6;
  }
  .stage.done .ghosttext { animation: ghostIn 2.2s ease forwards, ghostFloat 3.6s ease-in-out 2.2s infinite alternate; }
  @keyframes ghostIn { from { opacity: 0; transform: translateX(-50%) translateY(calc(var(--sh) * 0.08)) scale(0.92); }
                       to   { opacity: 0.92; transform: translateX(-50%) translateY(0) scale(1); } }
  @keyframes ghostFloat { from { transform: translateX(-50%) translateY(0); opacity: 0.92; }
                          to   { transform: translateX(-50%) translateY(calc(var(--sh) * -0.05)); opacity: 0.7; } }
  @media (prefers-reduced-motion: reduce) {
    .stage.done .ghosttext { animation: none; opacity: 0.92; }
  }

  /* ================= the reveal window ================= */
  /* everything left of the raised block's right edge is hidden — the arm and
     the dragged coin exist only inside this clipped window, so they appear
     and disappear exactly at the block's edge */
  .window {
    position: absolute;
    left: calc(var(--sw) * var(--tower-right));
    top: 0; right: 0; bottom: 0;
    overflow: hidden;
    z-index: 4; pointer-events: none;
  }

  /* ================= coin (inside the window) ================= */
  .coin {
    position: absolute;
    left: calc(var(--sw) * (var(--coin-x) - var(--tower-right)));
    top: calc(var(--crypt-top) - (var(--sw) * 0.046 / 2) * 0.48 * 2 - var(--sh) * 0.009); /* flat disc rests ON the top edge */
    width: calc(var(--sw) * 0.046); aspect-ratio: 1;
    opacity: 0;
  }
  .disc { position: absolute; inset: 0; }
  .disc .face, .disc .edge { position: absolute; inset: 0; }
  .disc .face {
    border-radius: 50%;
    background: radial-gradient(circle at 34% 30%, #ffe9a3, #d9a92f 58%, #8a6a14);
    border: calc(var(--sw) * 0.004) solid #b8912a;
    display: flex; align-items: center; justify-content: center;
  }
  .disc .face svg {                 /* minted skull, sockets punched through to the gold */
    width: 70%; height: 70%;
    fill: #6d5410;
    filter: drop-shadow(0 calc(var(--sh) * 0.002) 0 rgba(255,240,190,0.5));
  }
  .disc .edge {
    top: 38%; bottom: 38%;
    border-radius: calc(var(--sw) * 0.004);
    background:
      repeating-linear-gradient(90deg, #8a6a14 0 calc(var(--sw) * 0.003), #ffe9a3 calc(var(--sw) * 0.003) calc(var(--sw) * 0.006)),
      linear-gradient(180deg, #f2d879, #b8912a);
    background-blend-mode: multiply;
    box-shadow: 0 calc(var(--sw) * 0.002) calc(var(--sw) * 0.004) rgba(0,0,0,0.6);
    opacity: 0;
  }
  .coin.take { animation: coinTake 1.1s ease-in forwards; }
  .coin.take .face { animation: faceFade 1.1s linear forwards; }
  .coin.take .edge { animation: edgeShow 1.1s linear forwards; }
  @keyframes coinTake {
    0%   { opacity: 0; transform: translateY(calc(var(--sh) * -0.55)); }
    8%   { opacity: 1; }
    58%  { transform: translateY(0); }                        /* lands on the edge */
    70%  { transform: translateY(calc(var(--sh) * -0.03)); }  /* bounce */
    82%  { transform: translateY(0); }
    100% { transform: translateY(0); opacity: 1; }
  }
  @keyframes faceFade {  /* falls flat as it settles */
    0%, 80% { opacity: 1; transform: scaleY(1); }
    95%, 100% { opacity: 0; transform: scaleY(0.24); }
  }
  @keyframes edgeShow {
    0%, 82% { opacity: 0; }
    95%, 100% { opacity: 1; }
  }
  /* dragged left with the arm, exits through the window edge = swallowed;
     travel takes it fully behind the block (0.79 → 0.14, edge at 0.194) */
  .coin.gone { animation: coinGone 1.1s ease-in forwards; }
  .coin.gone .edge { opacity: 1; }
  .coin.gone .face { opacity: 0; }
  @keyframes coinGone {
    0%   { transform: translateX(0); opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateX(calc(var(--sw) * -0.46)); opacity: 0; }
  }

  /* ================= skeletal arm (inside the window) ================= */
  /* horizontal the whole time (fingers at the image's right end): wipes out of
     the raised block, reaches the coin with a small stuttered overshoot,
     then retracts behind the block dragging it */
  .armslide {
    position: absolute; left: 0; top: var(--arm-y);
    width: calc(var(--sw) * var(--arm-len));
    transform: translateX(-104%);      /* resting: fully behind the block */
  }
  .arm {
    display: block;
    width: 100%; height: auto;
    filter: drop-shadow(0 calc(var(--sh) * 0.012) calc(var(--sh) * 0.018) rgba(0,0,0,0.7));
  }
  .armslide.reach { animation: armReach 1.3s ease-out forwards; }
  @keyframes armReach {
    0%   { transform: translateX(-104%); }
    46%  { transform: translateX(calc(var(--arm-reach) + 5%)); }  /* lunges past */
    58%  { transform: translateX(calc(var(--arm-reach) - 2%)); }  /* checks back */
    72%  { transform: translateX(var(--arm-reach)); }             /* fingers on the coin */
    100% { transform: translateX(var(--arm-reach)); }
  }
  .armslide.retract { animation: armRetract 1.1s ease-in forwards; }
  @keyframes armRetract {
    from { transform: translateX(var(--arm-reach)); }
    to   { transform: translateX(-108%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .coin.take, .coin.take .face, .coin.take .edge, .coin.gone,
    .armslide.reach, .armslide.retract { animation-duration: 0.01s; }
  }

  /* ================= ledger ================= */
  .ledger {
    position: fixed; top: 25%; right: 20px;
    z-index: 2;
    width: calc(var(--sw) * 0.24);
    max-height: calc(var(--sw) * 0.46);
    background: linear-gradient(180deg, #e2d5af, var(--parch) 12%, #cbbb92);
    border-radius: 6px;
    box-shadow: 0 12px 24px rgba(0,0,0,0.6);
    padding: calc(var(--sw) * 0.016) calc(var(--sw) * 0.016) calc(var(--sw) * 0.022);
    font-family: 'IM Fell English', serif;
    color: #3a2c17;
    overflow-y: auto;
  }
  .ledger h2 {
    font-size: calc(var(--sw) * 0.019); font-weight: normal; letter-spacing: 0.18em;
    text-align: center; border-bottom: 1px solid rgba(58,44,23,0.4);
    padding-bottom: calc(var(--sw) * 0.007); margin-bottom: calc(var(--sw) * 0.008);
  }
  .ledger .line { display: flex; gap: calc(var(--sw) * 0.01); font-size: calc(var(--sw) * 0.018); padding: calc(var(--sw) * 0.0025) 0; }
  .ledger .no { opacity: 0.55; }
  .ledger .paid { margin-left: auto; font-style: italic; opacity: 0.65; }
  .ledger .endline { text-align: center; font-style: italic; margin-top: calc(var(--sw) * 0.008); opacity: 0.75; }

  .hint { color: #565d6b; font-size: 0.9rem; font-style: italic; font-family: 'IM Fell English', serif; }
  .version { position: fixed; bottom: 10px; right: 14px; color: #3c414d; font-size: 0.75rem; font-family: system-ui, sans-serif; }
</style>
</head>
<body>

<div class="fogwrapper" aria-hidden="true">
  <div class="foginner">
    <div class="foglayer" id="foglayer_01"><div class="image01"></div><div class="image02"></div></div>
    <div class="foglayer" id="foglayer_02"><div class="image01"></div><div class="image02"></div></div>
    <div class="foglayer" id="foglayer_03"><div class="image01"></div><div class="image02"></div></div>
  </div>
</div>

<h1>The Last Deposit<span class="sub">skeleton crypt bank</span></h1>

<div class="main">
  <div class="stage" id="stage">
    <div class="plinth p2"></div>
    <div class="plinth p1"></div>
    <button class="carvedbtn" id="coinBtn">Drop a Coin</button>
    <button class="carvedbtn" id="reshuffleBtn">Reshuffle</button>
    <div class="crypt">
      <div class="molding mtop"></div>
      <div class="molding mbase"></div>
      <div class="plaqueframe"></div>
      <div class="rip">R.I.P.</div>
      <div class="stain s1"></div>
      <div class="stain s2"></div>
      <div class="stain s3"></div>
      <div class="stain s4"></div>
      <div class="stain s5"></div>
      <div class="streak k1"></div>
      <div class="streak k2"></div>
      <div class="streak k3"></div>
      <div class="streak k4"></div>
      <div class="streak k5"></div>
      <div class="streak k6"></div>
      <div class="grime"></div>
    </div>
    <div class="ghosttext" id="ghostText"></div>
    <div class="engraving" id="engraving"></div>
    <div class="window">
      <div class="coin" id="coin"><div class="disc"><div class="face"><svg viewBox="0 0 100 100" aria-hidden="true"><path fill-rule="evenodd" d="M50 10 C28 10 14 24 14 42 C14 53 20 61 27 66 L27 78 C27 83 31 87 36 87 L64 87 C69 87 73 83 73 78 L73 66 C80 61 86 53 86 42 C86 24 72 10 50 10 Z M36 38 a8.5 8.5 0 1 1 -0.1 0 Z M64 38 a8.5 8.5 0 1 1 -0.1 0 Z M50 52 L44 64 L56 64 Z M41 76 h4 v11 h-4 Z M48 76 h4 v11 h-4 Z M55 76 h4 v11 h-4 Z"/></svg></div><div class="edge"></div></div></div>
      <div class="armslide" id="armslide"><img class="arm" src="skeleton-arm.png" alt=""></div>
    </div>
  </div>

  <div class="ledger" id="ledger">
    <h2>LEDGER OF SOULS</h2>
  </div>
</div>

<div class="version">v4.8.0</div>

<script>
  const VERSION = '4.8.0';

  // ===== CUSTOMISE YOUR MESSAGES HERE =====
  const END_MESSAGE = 'ALL DONE';
  // ========================================

  // ===== DEFAULT NAMES (fallback) =====
  const ANSWERS = [
    'WARWICK', 'CHRISTOPHER', 'ADIYA', 'JENNIFER', 'MADELINE',
    'CAMILLE', 'FRANCO', 'SARA', 'CHUM', 'MAYA'
  ];
  // ====================================

  // names.json is the single source of truth when served over HTTP;
  // the ANSWERS array above is only the offline / file:// fallback
  const DEFAULTS_URL = 'names.json';
  let names = ANSWERS.slice();

  fetch(DEFAULTS_URL)
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      if (d && Array.isArray(d.names) && d.names.length &&
          JSON.stringify(d.names) !== JSON.stringify(names)) {
        names = d.names;
        randomise(true);
      }
    })
    .catch(() => {});

  const stage = document.getElementById('stage');
  const coin = document.getElementById('coin');
  const armslide = document.getElementById('armslide');
  const ghostText = document.getElementById('ghostText');
  const engraving = document.getElementById('engraving');
  const ledger = document.getElementById('ledger');

  ghostText.textContent = END_MESSAGE;

  /* --- stage pixel dims for the animation keyframes --- */
  function fitStage() {
    const r = stage.getBoundingClientRect();
    document.documentElement.style.setProperty('--sw', r.width + 'px');
    document.documentElement.style.setProperty('--sh', r.height + 'px');
    fitEngraving();
  }
  window.addEventListener('resize', fitStage);

  /* --- timings (ms) — must line up with the CSS animation durations --- */
  const COIN_MS    = 1100;  // drop, bounce, fall flat
  const REACH_MS   = 1300;  // arm wipes out of the block, lunge + check, lands
  const GRAB_MS    = 300;   // beat with fingers on the coin
  const RETRACT_MS = 1100;  // arm + coin pulled back fully behind the block
  const FADE_MS    = 350;   // old engraving fades before the next coin

  /* --- game state (same flow as the other tools) --- */
  let order = [];
  let pos = -1;
  let busy = false;

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function clearLedger() { ledger.querySelectorAll('.line, .endline').forEach(el => el.remove()); }
  function printLedger(n, name) {
    const line = document.createElement('div');
    line.className = 'line';
    line.innerHTML = '<span class="no"></span><span class="nm"></span><span class="paid">paid</span>';
    line.querySelector('.no').textContent = String(n).padStart(2, '0');
    line.querySelector('.nm').textContent = name;
    ledger.appendChild(line);
    ledger.scrollTop = ledger.scrollHeight;
  }
  function printEnd() {
    const line = document.createElement('div');
    line.className = 'endline';
    line.textContent = '— the ledger is closed —';
    ledger.appendChild(line);
    ledger.scrollTop = ledger.scrollHeight;
  }

  function fitEngraving() {
    const len = Math.max(4, (engraving.textContent || '').length);
    const sw = stage.getBoundingClientRect().width || 1000;
    engraving.style.fontSize = Math.min(sw * 0.042, (sw * 0.52) / (len * 0.72)) + 'px';
  }

  function resetActors() {   // restart-proof: clear all animation classes + reflow
    coin.classList.remove('take', 'gone');
    armslide.classList.remove('reach', 'retract');
    void coin.offsetWidth;
    void armslide.offsetWidth;
  }

  // force=true: programmatic restart (new list adopted) must not be blocked
  function randomise(force) {
    if (busy && !force) return;
    busy = true;
    order = shuffle(names);
    pos = -1;
    clearLedger();
    engraving.textContent = '';
    stage.classList.remove('done', 'engraved');
    resetActors();
    setTimeout(() => { busy = false; }, 300);
  }

  // advance: coin drops onto the slab and falls flat → the arm wipes out of the
  // raised block, reaches it → both retract behind the block → the name is
  // carved into the marble plaque. After the last soul: ghostly ALL DONE.
  function next() {
    if (busy || order.length === 0) return;
    if (pos >= order.length) return; // finished — ignore further clicks
    busy = true;

    pos++;
    const myPos = pos; // guard token: force-randomise resets pos mid-sequence
    const finished = pos >= order.length;

    if (finished) {
      stage.classList.remove('engraved');
      setTimeout(() => {
        if (pos !== myPos) return;
        stage.classList.add('done');
        printEnd();
        busy = false;
      }, FADE_MS + 200);
      return;
    }

    stage.classList.remove('engraved');   // previous name fades out
    const t = (ms, fn) => setTimeout(() => { if (pos === myPos) fn(); }, ms);

    setTimeout(() => {
      if (pos !== myPos) return;
      resetActors();
      coin.classList.add('take');
      t(COIN_MS,                       () => armslide.classList.add('reach'));
      t(COIN_MS + REACH_MS + GRAB_MS,  () => { armslide.classList.add('retract'); coin.classList.add('gone'); });
      t(COIN_MS + REACH_MS + GRAB_MS + RETRACT_MS + 100, () => {
        engraving.textContent = order[pos];
        fitEngraving();
        stage.classList.add('engraved');     // the name is carved into the marble
        printLedger(pos + 1, order[pos]);
        busy = false;
      });
    }, FADE_MS);
  }

  document.getElementById('coinBtn').addEventListener('click', next);
  document.getElementById('reshuffleBtn').addEventListener('click', () => { if (!busy) randomise(); });
  document.addEventListener('keydown', (e) => {
    if ((e.key === 'Enter' || e.key === ' ') && document.activeElement.tagName !== 'BUTTON') {
      e.preventDefault();
      next();
    }
  });

  /* --- boot --- */
  fitStage();
  randomise(true);

</script>

</body>
</html>
